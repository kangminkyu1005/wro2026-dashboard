<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WRO 2026 Heritage Heroes — Team Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0d0d1a;
    --bg2: #141428;
    --bg3: #1a1a35;
    --card: #1e1e3a;
    --card2: #252548;
    --border: rgba(100,120,255,0.18);
    --border2: rgba(100,120,255,0.35);
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #a5b4fc;
    --gold: #f59e0b;
    --gold2: #fbbf24;
    --teal: #14b8a6;
    --coral: #f43f5e;
    --green: #22c55e;
    --amber: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HERO HEADER */
  .hero {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0a35 50%, #0a1535 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1.5rem 1rem;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .wro-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .wro-emblem {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .wro-title { flex: 1; min-width: 200px; }
  .wro-title h1 {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .wro-title .subtitle {
    font-size: 11px;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  /* DDAY COUNTER */
  .dday-area {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
  }
  .dday-box {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0.4rem 0.75rem;
    text-align: center;
    min-width: 56px;
  }
  .dday-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold2);
    display: block;
    line-height: 1;
  }
  .dday-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .dday-badge {
    background: linear-gradient(135deg, var(--gold), #ef4444);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    align-self: center;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* NAV TABS */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    overflow-x: auto;
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  .nav-tab {
    padding: 0.75rem 1.25rem;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
  }

  /* MAIN CONTENT */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 0.5rem;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
  .gap-1 { margin-bottom: 1rem; }
  .gap-15 { margin-bottom: 1.5rem; }

  /* STATS */
  .stat-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent2);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* RANKING TABLE */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .rank-table td {
    padding: 0.75rem 0.75rem;
    border-bottom: 1px solid rgba(100,120,255,0.08);
    vertical-align: middle;
  }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tr:hover td { background: rgba(99,102,241,0.05); }

  .rank-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .rank-1 { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); }
  .rank-2 { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
  .rank-3 { background: rgba(180,83,9,0.2); color: #cd7c3a; border: 1px solid rgba(180,83,9,0.3); }
  .rank-n { background: rgba(100,116,139,0.1); color: var(--text3); border: 1px solid var(--border); }

  .team-name-cell { font-weight: 600; color: var(--text); }
  .team-school { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .score-pill {
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(20,184,166,0.2));
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 20px;
    padding: 0.2rem 0.75rem;
    font-weight: 700;
    font-size: 15px;
    color: var(--accent3);
  }

  .progress-bar-wrap {
    height: 6px;
    background: rgba(100,120,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    border-radius: 3px;
    transition: width 0.4s;
  }

  /* MISSION ZONES */
  .zone-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
  }
  .zone-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .zone-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .zone-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .zone-max { font-size: 11px; color: var(--text3); margin-left: auto; }

  .mission-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(100,120,255,0.06);
    cursor: pointer;
  }
  .mission-item:last-child { border-bottom: none; }
  .mission-item:hover { opacity: 0.85; }
  .mission-check {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .mission-check.done {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .mission-text { flex: 1; }
  .mission-name { font-size: 12px; color: var(--text); }
  .mission-pts { font-size: 11px; color: var(--teal); margin-top: 1px; }

  /* TEAM FORM */
  .form-group { margin-bottom: 0.875rem; }
  .form-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 0.35rem;
  }
  .form-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.875rem;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  textarea.form-input { resize: vertical; min-height: 70px; }

  .btn {
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.6rem 1.25rem;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: rgba(99,102,241,0.1); }
  .btn-danger {
    background: rgba(244,63,94,0.15);
    color: var(--coral);
    border: 1px solid rgba(244,63,94,0.3);
  }
  .btn-danger:hover { background: rgba(244,63,94,0.25); }
  .btn-sm { padding: 0.35rem 0.75rem; font-size: 12px; }

  /* TEAM CARDS ON DASHBOARD */
  .team-dash-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .team-dash-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .team-dash-card.selected { border-color: var(--accent); }
  .team-dash-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .team-dash-school { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
  .team-members { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.75rem; }
  .member-chip {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 20px;
    padding: 0.15rem 0.6rem;
    font-size: 11px;
    color: var(--accent3);
  }
  .team-score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
  }
  .team-big-score {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .time-badge {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  /* ROUTE BUILDER */
  .route-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    min-height: 80px;
  }
  .route-step {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 0.25rem 0.75rem;
    font-size: 12px;
    margin: 0.25rem;
    cursor: grab;
    user-select: none;
  }
  .route-step .step-num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .route-arrow { color: var(--text3); font-size: 16px; vertical-align: middle; }

  /* MOOD / PLEDGE */
  .pledge-card {
    background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(20,184,166,0.05));
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .pledge-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    font-style: italic;
  }
  .pledge-author {
    font-size: 12px;
    color: var(--accent3);
    margin-top: 0.5rem;
    font-style: normal;
    font-weight: 600;
  }

  /* MODAL */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 1.25rem;
    color: var(--text);
  }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0.25rem;
  }
  .modal-close:hover { color: var(--text); }

  /* PILL TAGS */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .pill-amber { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
  .pill-red { background: rgba(244,63,94,0.15); color: var(--coral); border: 1px solid rgba(244,63,94,0.3); }
  .pill-blue { background: rgba(99,102,241,0.15); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3); }

  /* SPARKLE / decoration */
  .section-tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 0.35rem;
    display: block;
  }
  .section-h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
  }

  /* ANNOUNCEMENT BANNER */
  .banner {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(20,184,166,0.1));
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: var(--radius);
    padding: 0.875rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .banner-icon { font-size: 22px; flex-shrink: 0; }
  .banner-text { font-size: 13px; color: var(--text2); }
  .banner-text strong { color: var(--accent3); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .hero-inner { gap: 0.5rem; }
    .dday-box { min-width: 44px; padding: 0.35rem 0.5rem; }
    .dday-num { font-size: 18px; }
    .main { padding: 1rem; }
    .modal { padding: 1.25rem; }
  }

  /* STAR DECORATION */
  .stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.3;
  }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars-bg" id="stars"></div>

<!-- HERO HEADER -->
<header class="hero">
  <div class="hero-inner">
    <div class="wro-logo">
      <div class="wro-emblem">🏛️</div>
      <div class="wro-title">
        <div class="subtitle">WRO 2026 · RoboMission · 중등부</div>
        <h1>Heritage Heroes Dashboard</h1>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;margin-left:auto">
      <span id="sync-status" style="font-size:11px;color:var(--text3);letter-spacing:0.3px">⏳ 연결 중...</span>
      <div class="dday-area" id="dday-area"></div>
    </div>
  </div>
</header>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <button class="nav-tab active" onclick="showTab('dashboard')">🏆 종합 현황</button>
    <button class="nav-tab" onclick="showTab('missions')">🗺️ 미션 체크</button>
    <button class="nav-tab" onclick="showTab('teams')">👥 팀 정보</button>
    <button class="nav-tab" onclick="showTab('route')">🚀 경로 설계</button>
    <button class="nav-tab" onclick="showTab('scores')">📊 점수 상세</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main-content">
  <!-- filled by JS -->
</main>

<!-- MODAL -->
<div class="modal-bg" id="modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const MISSIONS = [
  {
    id: 'm1', zone: '방문객 안내', color: '#6366f1', dotColor: '#6366f1',
    tasks: [
      { id: 't1a', name: '방문객 1 — 색상 구역 완전 진입', pts: 10 },
      { id: 't1b', name: '방문객 2 — 색상 구역 완전 진입', pts: 10 },
      { id: 't1c', name: '방문객 3 — 색상 구역 완전 진입', pts: 10 },
      { id: 't1d', name: '방문객 4 — 색상 구역 완전 진입', pts: 10 },
    ],
    maxScore: 40,
    partialTask: { id: 't1p', name: '방문객 일부 걸침 (개당 5점)', pts: 5 }
  },
  {
    id: 'm2', zone: '탑 재건', color: '#f59e0b', dotColor: '#f59e0b',
    tasks: [
      { id: 't2a', name: '빨간색 탑 — 구역 완전 진입', pts: 15 },
      { id: 't2b', name: '빨간색 탑 — 일부 걸침', pts: 10 },
      { id: 't2c', name: '노란색 탑 받침대 — 구역 완전 진입', pts: 25 },
      { id: 't2d', name: '노란색 탑 받침대 — 일부 걸침', pts: 15 },
    ],
    maxScore: 80,
    note: '빨간 탑 최대 30점 · 노란 탑 최대 50점'
  },
  {
    id: 'm3', zone: '유물 운반', color: '#14b8a6', dotColor: '#14b8a6',
    tasks: [
      { id: 't3a', name: '유물 1 — 색상 전시 장소 완전 진입', pts: 15 },

// Firebase SDK는 <head>에 CDN으로 로드됨 (파일 상단 참고)

let db = null;
let teamsRef = null;
let firebaseReady = false;

function initFirebase() {
  try {
    if (!firebase || firebaseConfig.apiKey === 'YOUR_API_KEY') {
      showFirebaseGuide();
      return false;
    }
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    teamsRef = db.ref('wro2026/teams');

    // 실시간 리스너: 다른 사람이 수정하면 즉시 내 화면도 갱신
    teamsRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // 객체 → 배열 변환
        state.teams = Object.values(data);
      } else {
        // DB에 데이터 없으면 초기 샘플 데이터 push
        pushInitialData();
      }
      render();
      updateSyncStatus('connected');
    }, (error) => {
      console.error('Firebase 연결 오류:', error);
      updateSyncStatus('error');
      fallbackToLocal();
    });

    firebaseReady = true;
    return true;
  } catch(e) {
    console.warn('Firebase 초기화 실패, 로컬 모드로 전환:', e);
    fallbackToLocal();
    return false;
  }
}

function pushInitialData() {
  // 최초 실행 시 샘플 팀 데이터를 Firebase에 저장
  state.teams.forEach(team => {
    teamsRef.child(team.id).set(team);
  });
}

// Firebase에 팀 1개 저장 (추가/수정)
function saveTeamToFirebase(team) {
  if (!firebaseReady || !teamsRef) { fallbackToLocal(); return; }
  teamsRef.child(team.id).set(team)
    .then(() => updateSyncStatus('saved'))
    .catch(e => { console.error(e); updateSyncStatus('error'); });
}

// Firebase에서 팀 1개 삭제
function deleteTeamFromFirebase(id) {
  if (!firebaseReady || !teamsRef) { fallbackToLocal(); return; }
  teamsRef.child(id).remove()
    .catch(e => console.error(e));
}

// Firebase 미설정 시 localStorage 폴백
function fallbackToLocal() {
  try {
    const s = localStorage.getItem('wro2026_state');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
  render();
}
function saveState() {
  if (firebaseReady) return; // Firebase 모드에서는 개별 함수로 저장
  try { localStorage.setItem('wro2026_state', JSON.stringify(state)); } catch(e) {}
}

// 동기화 상태 표시
function updateSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    connected: { text: '🟢 실시간 연결됨', color: 'var(--green)' },
    saved:     { text: '✅ 저장됨', color: 'var(--teal)' },
    error:     { text: '🔴 연결 오류 (로컬 모드)', color: 'var(--coral)' },
    local:     { text: '🟡 로컬 모드 (Firebase 미설정)', color: 'var(--amber)' },
  };
  const s = map[status] || map.local;
  el.textContent = s.text;
  el.style.color = s.color;
}

// ─── HELPERS ────────────────────────────────────────────
function getTeamScore(team) {
  let s = 0;
  MISSIONS.forEach(m => m.tasks.forEach(t => {
    if (team.completedTasks.includes(t.id)) s += t.pts;
  }));
  return s;
}
function getTeamMissionCount(team) {
  return MISSIONS.filter(m =>
    m.tasks.some(t => team.completedTasks.includes(t.id))
  ).length;
}
function getTeamProgress(team) {
  const total = MISSIONS.reduce((a, m) => a + m.tasks.length, 0);
  return Math.round((team.completedTasks.length / total) * 100);
}
function getRankedTeams() {
  return [...state.teams].sort((a, b) => {
    const sa = getTeamScore(a), sb = getTeamScore(b);
    if (sb !== sa) return sb - sa;
    if (a.completedTime && b.completedTime) {
      return a.completedTime.localeCompare(b.completedTime);
    }
    return a.completedTime ? -1 : 1;
  });
}
function selectedTeam() {
  return state.teams.find(t => t.id === state.selectedTeamId) || state.teams[0];
}
function getZoneScore(team, missionId) {
  const m = MISSIONS.find(x => x.id === missionId);
  if (!m) return 0;
  return m.tasks.filter(t => team.completedTasks.includes(t.id)).reduce((a, t) => a + t.pts, 0);
}

function renderDDay() {
  const now = new Date();
  const diff = CONTEST_DATE - now;
  if (diff <= 0) {
    document.getElementById('dday-area').innerHTML = '<span class="dday-badge">🎉 대회 당일!</span>';
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  const secs = Math.floor((diff % (1000*60)) / 1000);
  document.getElementById('dday-area').innerHTML = `
    <div class="dday-box"><span class="dday-num">${days}</span><div class="dday-label">일</div></div>
    <div class="dday-box"><span class="dday-num">${String(hours).padStart(2,'0')}</span><div class="dday-label">시간</div></div>
    <div class="dday-box"><span class="dday-num">${String(mins).padStart(2,'0')}</span><div class="dday-label">분</div></div>
    <div class="dday-box"><span class="dday-num">${String(secs).padStart(2,'0')}</span><div class="dday-label">초</div></div>
    <div class="dday-badge">D-${days}</div>
  `;
}

function renderTeams() {
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div class="section-h2" style="margin-bottom:0">팀 정보 관리</div>
    <button class="btn btn-primary" onclick="openAddTeam()">+ 팀 추가</button>
  </div>

  <div class="grid-2">
    ${state.teams.map(team => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${team.name}</div>
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-ghost btn-sm" onclick="openEditTeam('${team.id}')">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTeam('${team.id}')">삭제</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem 1rem;margin-bottom:0.875rem;font-size:13px">
        <div><span style="color:var(--text3)">학교</span><br><strong>${team.school}</strong></div>
        <div><span style="color:var(--text3)">학년</span><br><strong>${team.grade}</strong></div>
        <div><span style="color:var(--text3)">역할</span><br><strong>${team.role}</strong></div>
        <div><span style="color:var(--text3)">점수</span><br><strong style="color:var(--accent2)">${getTeamScore(team)}점</strong></div>
      </div>
      <div style="margin-bottom:0.75rem">
        <div style="font-size:11px;color:var(--text3);margin-bottom:0.4rem">👤 팀원</div>
        <div class="team-members">
          ${team.members.map(m=>`<span class="member-chip">${m}</span>`).join('')}
        </div>
      </div>
      ${team.pledge ? `
      <div class="pledge-card">
        <div style="font-size:11px;color:var(--teal);margin-bottom:4px">💬 대회 각오</div>
        <div class="pledge-text">"${team.pledge}"</div>
        <div class="pledge-author">— ${team.name}</div>
      </div>` : ''}
    </div>
    `).join('')}
  </div>
  `;
}

// ─── ROUTE ──────────────────────────────────────────────
function renderRoute() {
  const team = selectedTeam();
  const zones = MISSIONS.map(m => m.zone);
  return `
  <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
    <span style="font-size:14px;color:var(--text2)">팀 선택:</span>
    ${state.teams.map(t => `
      <button onclick="selectTeam('${t.id}');render()" class="btn btn-sm ${t.id===state.selectedTeamId?'btn-primary':'btn-ghost'}">${t.name}</button>
    `).join('')}
  </div>

  <div class="card gap-15">
    <div class="card-header">
      <div class="card-title">🚀 ${team.name} — 미션 수행 경로</div>
    </div>

    <div style="margin-bottom:1rem">
      <div style="font-size:12px;color:var(--text3);margin-bottom:0.75rem">현재 경로 (드래그 아이콘을 클릭해 순서 변경):</div>
      <div class="route-box" id="route-display">
        ${renderRouteSteps(team)}
      </div>
    </div>

    <div style="margin-bottom:0.75rem">
      <div style="font-size:12px;color:var(--text3);margin-bottom:0.5rem">경로에 구역 추가:</div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
        ${zones.map((z,i) => `
        <button class="btn btn-ghost btn-sm" onclick="addRouteZone('${team.id}','${z}')"
          style="border-color:${MISSIONS[i].dotColor};color:${MISSIONS[i].dotColor}">
          + ${z}
        </button>`).join('')}
        <button class="btn btn-danger btn-sm" onclick="clearRoute('${team.id}')">초기화</button>
      </div>
    </div>

    <div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem">
      <div style="font-size:12px;color:var(--text3);margin-bottom:0.5rem">📍 경로 시각화</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0.25rem;min-height:40px">
        ${team.route && team.route.length > 0 ? team.route.map((z,i) => {
          const m = MISSIONS.find(x=>x.zone===z);
          return `
          <span style="display:inline-flex;align-items:center;gap:4px">
            <span style="background:${m?m.dotColor:'var(--accent)'};color:#fff;padding:0.2rem 0.6rem;border-radius:20px;font-size:12px;font-weight:600">${i+1}. ${z}</span>
            ${i < team.route.length-1 ? '<span style="color:var(--text3);font-size:18px">→</span>' : ''}
          </span>`;
        }).join('') : '<span style="color:var(--text3);font-size:13px">경로를 추가해주세요</span>'}
      </div>
    </div>

    <div style="margin-top:0.75rem;padding:0.875rem;background:rgba(99,102,241,0.05);border-radius:var(--radius-sm);border:1px solid var(--border)">
      <div style="font-size:12px;color:var(--accent3);font-weight:600;margin-bottom:0.4rem">💡 경로 전략 팁</div>
      <ul style="font-size:12px;color:var(--text2);list-style:none;display:flex;flex-direction:column;gap:0.3rem">
        <li>• 보너스 구역(차단막/앵무새)은 경로 초반에 배치해 안전하게 유지하세요</li>
        <li>• 탑 재건은 복잡한 조작이 필요하므로 중반에 배치 권장</li>
        <li>• 먼지 치우기는 이동 중 처리 가능하면 경로를 합칠 수 있습니다</li>
        <li>• 시간이 부족하면 점수가 높은 유물 운반(최대 60점)을 우선시하세요</li>
      </ul>
    </div>
  </div>
  `;
}

function renderRouteSteps(team) {
  if (!team.route || team.route.length === 0) {
    return '<span style="color:var(--text3);font-size:13px">아직 경로가 없습니다. 아래에서 구역을 추가하세요.</span>';
  }
  return team.route.map((z, i) => {
    const m = MISSIONS.find(x => x.zone === z);
    return `
    <span class="route-step" style="border-color:${m?m.dotColor:'var(--border2)'}">
      <span class="step-num" style="background:${m?m.dotColor:'var(--accent)'}">${i+1}</span>
      ${z}
      <button onclick="removeRouteStep('${team.id}',${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:0 2px;font-size:14px;line-height:1">×</button>
    </span>
    ${i < team.route.length-1 ? '<span class="route-arrow">→</span>' : ''}`;
  }).join('');
}

// ─── SCORES ─────────────────────────────────────────────
function renderScores() {
  const ranked = getRankedTeams();
  return `
  <span class="section-tag">점수 상세 분석</span>
  <div class="card gap-15">
    <div class="card-header">
      <div class="card-title">📊 구역별 점수 비교</div>
    </div>
    <div style="overflow-x:auto">
      <table class="rank-table" style="min-width:600px">
        <thead>
          <tr>
            <th>팀</th>
            ${MISSIONS.map(m=>`<th style="color:${m.dotColor}">${m.zone}<br><span style="color:var(--text3);font-size:10px">최대 ${m.maxScore}점</span></th>`).join('')}
            <th>합계</th>
          </tr>
        </thead>
        <tbody>
          ${ranked.map((team,i) => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:0.5rem">
                <span class="rank-badge ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</span>
                <div>
                  <div style="font-weight:600;font-size:13px">${team.name}</div>
                  <div style="font-size:11px;color:var(--text3)">${team.school}</div>
                </div>
              </div>
            </td>
            ${MISSIONS.map(m => {
              const s = getZoneScore(team, m.id);
              const pct = Math.round((s/m.maxScore)*100);
              return `<td>
                <div style="font-weight:600;font-size:14px;color:${m.dotColor}">${s}</div>
                <div style="height:4px;background:rgba(100,120,255,0.1);border-radius:2px;margin-top:4px;width:60px">
                  <div style="height:100%;width:${pct}%;background:${m.dotColor};opacity:0.7;border-radius:2px"></div>
                </div>
              </td>`;
            }).join('')}
            <td><span class="score-pill">${getTeamScore(team)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="grid-2" style="margin-top:1rem">
    ${MISSIONS.map(m => {
      const scores = state.teams.map(t => ({ name: t.name, score: getZoneScore(t, m.id) }))
        .sort((a,b)=>b.score-a.score);
      return `
      <div class="zone-card">
        <div class="zone-header">
          <div class="zone-dot" style="background:${m.dotColor}"></div>
          <div class="zone-name">${m.zone}</div>
          <div class="zone-max">최대 ${m.maxScore}점</div>
        </div>
        ${scores.map((s,i) => `
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem">
          <span style="font-size:11px;color:var(--text3);width:16px">${i+1}</span>
          <span style="font-size:12px;flex:1;color:var(--text2)">${s.name}</span>
          <div class="progress-bar-wrap" style="width:60px">
            <div class="progress-bar-fill" style="width:${Math.round(s.score/m.maxScore*100)}%;background:${m.dotColor}"></div>
          </div>
          <span style="font-size:13px;font-weight:600;color:${m.dotColor};min-width:28px;text-align:right">${s.score}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}
  </div>
  `;
}

// ─── ACTIONS ────────────────────────────────────────────
function selectTeam(id) {
  state.selectedTeamId = id;
  saveState();
  render();
}

function toggleTask(teamId, taskId) {
  const team = state.teams.find(t => t.id === teamId);
  if (!team) return;
  const idx = team.completedTasks.indexOf(taskId);
  if (idx >= 0) team.completedTasks.splice(idx, 1);
  else team.completedTasks.push(taskId);
  if (firebaseReady) saveTeamToFirebase(team);
  else { saveState(); render(); }
}

function updateTime(teamId, val) {
  const team = state.teams.find(t => t.id === teamId);
  if (!team) return;
  team.completedTime = val || null;
  if (firebaseReady) saveTeamToFirebase(team);
  else saveState();
}

function addRouteZone(teamId, zone) {
  const team = state.teams.find(t => t.id === teamId);
  if (!team) return;
  if (!team.route) team.route = [];
  team.route.push(zone);
  if (firebaseReady) saveTeamToFirebase(team);
  else { saveState(); render(); }
}

function removeRouteStep(teamId, idx) {
  const team = state.teams.find(t => t.id === teamId);
  if (!team || !team.route) return;
  team.route.splice(idx, 1);
  if (firebaseReady) saveTeamToFirebase(team);
  else { saveState(); render(); }
}

function clearRoute(teamId) {
  const team = state.teams.find(t => t.id === teamId);
  if (!team) return;
  team.route = [];
  if (firebaseReady) saveTeamToFirebase(team);
  else { saveState(); render(); }
}

function deleteTeam(id) {
  if (!confirm('이 팀을 삭제할까요?')) return;
  state.teams = state.teams.filter(t => t.id !== id);
  if (state.selectedTeamId === id && state.teams.length > 0) state.selectedTeamId = state.teams[0].id;
  if (firebaseReady) deleteTeamFromFirebase(id);
  else { saveState(); render(); }
}

// ─── MODALS ─────────────────────────────────────────────
function openAddTeam() {
  document.getElementById('modal-body').innerHTML = teamFormHTML(null);
  document.getElementById('modal').style.display = 'flex';
}
function openEditTeam(id) {
  const team = state.teams.find(t => t.id === id);
  document.getElementById('modal-body').innerHTML = teamFormHTML(team);
  document.getElementById('modal').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').style.display = 'none';
  }
}

function teamFormHTML(team) {
  const isEdit = !!team;
  return `
  <div class="modal-title">${isEdit ? '팀 정보 수정' : '새 팀 추가'}</div>
  <input type="hidden" id="f-id" value="${team?.id||''}">
  <div class="grid-2">
    <div class="form-group">
      <label class="form-label">팀명 *</label>
      <input class="form-input" id="f-name" placeholder="팀명 입력" value="${team?.name||''}">
    </div>
    <div class="form-group">
      <label class="form-label">학교명 *</label>
      <input class="form-input" id="f-school" placeholder="학교 이름" value="${team?.school||''}">
    </div>
    <div class="form-group">
      <label class="form-label">학년</label>
      <input class="form-input" id="f-grade" placeholder="예: 2학년" value="${team?.grade||''}">
    </div>
    <div class="form-group">
      <label class="form-label">역할</label>
      <input class="form-input" id="f-role" placeholder="예: 드라이버, 코더" value="${team?.role||''}">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">팀원 (쉼표로 구분)</label>
    <input class="form-input" id="f-members" placeholder="예: 김민준, 이서연" value="${team?.members?.join(', ')||''}">
  </div>
  <div class="form-group">
    <label class="form-label">대회 각오</label>
    <textarea class="form-input" id="f-pledge" placeholder="팀의 대회 각오를 입력하세요">${team?.pledge||''}</textarea>
  </div>
  <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem">
    <button class="btn btn-ghost" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="saveTeam()">저장</button>
  </div>`;
}

function saveTeam() {
  const id = document.getElementById('f-id').value;
  const name = document.getElementById('f-name').value.trim();
  const school = document.getElementById('f-school').value.trim();
  if (!name || !school) { alert('팀명과 학교명은 필수입니다.'); return; }
  const grade = document.getElementById('f-grade').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const members = document.getElementById('f-members').value.split(',').map(s=>s.trim()).filter(Boolean);
  const pledge = document.getElementById('f-pledge').value.trim();

  let team;
  if (id) {
    team = state.teams.find(t => t.id === id);
    if (team) Object.assign(team, { name, school, grade, role, members, pledge });
  } else {
    team = {
      id: 'team'+Date.now(),
      name, school, grade, role, members, pledge,
      completedTasks: [],
      completedTime: null,
      route: []
    };
    state.teams.push(team);
  }
  if (firebaseReady) saveTeamToFirebase(team);
  else { saveState(); render(); }
  closeModal();
}

// ─── INIT ───────────────────────────────────────────────
// Firebase 초기화 시도 → 실패하면 localStorage 폴백
window.addEventListener('load', () => {
  const ok = initFirebase();
  if (!ok) {
    fallbackToLocal();
    render();
  }
});
</script>
</body>
</html>
