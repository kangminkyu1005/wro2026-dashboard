<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WRO 2026 Heritage Heroes — Team Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg:#0d0d1a;--bg2:#141428;--bg3:#1a1a35;--card:#1e1e3a;--card2:#252548;
    --border:rgba(100,120,255,0.18);--border2:rgba(100,120,255,0.35);
    --accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
    --gold:#f59e0b;--gold2:#fbbf24;--teal:#14b8a6;--coral:#f43f5e;
    --green:#22c55e;--amber:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

  /* ── HERO ── */
  .hero{background:linear-gradient(135deg,#0d0d1a 0%,#1a0a35 50%,#0a1535 100%);border-bottom:1px solid var(--border);padding:0.75rem 1rem;position:sticky;top:0;z-index:50;}
  .hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
  .wro-emblem{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .wro-title{flex:1;min-width:140px;}
  .wro-title h1{font-size:clamp(13px,3.5vw,20px);font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wro-title .subtitle{font-size:10px;color:var(--accent3);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0;}
  .sync-badge{font-size:10px;color:var(--text3);white-space:nowrap;}
  .sync-mobile{display:none;}
  @media(max-width:480px){
    .hero-inner{justify-content:space-between;}
    .wro-title{order:2;flex-basis:100%;min-width:0;margin-top:0.4rem;}
    .wro-title h1{white-space:normal;font-size:15px;}
    .wro-title .subtitle{white-space:normal;}
    .wro-emblem{order:1;}
    .hero-right{order:1;flex-direction:row;align-items:center;gap:0.5rem;}
    .sync-desktop{display:none;}
    .sync-mobile{display:inline-block;margin-left:6px;font-size:9px;vertical-align:middle;}
  }

  /* ── DDAY ── */
  .dday-area{display:flex;gap:0.3rem;align-items:center;}
  .dday-box{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:0.25rem 0.4rem;text-align:center;min-width:36px;}
  .dday-num{font-size:16px;font-weight:700;color:var(--gold2);display:block;line-height:1;}
  .dday-label{font-size:9px;color:var(--text3);letter-spacing:0.3px;}
  .dday-badge{background:linear-gradient(135deg,var(--gold),#ef4444);color:#fff;font-size:11px;font-weight:700;padding:0.2rem 0.6rem;border-radius:20px;white-space:nowrap;}

  /* ── NAV ── */
  .nav{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .nav::-webkit-scrollbar{display:none;}
  .nav-inner{max-width:1200px;margin:0 auto;display:flex;}
  .nav-tab{padding:0.65rem 0.875rem;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s;}
  .nav-tab:hover{color:var(--text);}
  .nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}

  /* ── MAIN ── */
  .main{max-width:1200px;margin:0 auto;padding:1rem;}

  /* ── CARD ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.875rem;gap:0.5rem;flex-wrap:wrap;}
  .card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:0.5rem;}

  /* ── GRIDS ── */
  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;}
  @media(max-width:480px){.grid-4{grid-template-columns:repeat(2,1fr);}}
  .gap-1{margin-bottom:1rem;}.gap-15{margin-bottom:1.5rem;}

  /* ── STAT ── */
  .stat-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.875rem;text-align:center;}
  .stat-num{font-size:24px;font-weight:700;color:var(--accent2);display:block;line-height:1;}
  .stat-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}

  /* ── RANK TABLE (desktop) ── */
  .rank-table{width:100%;border-collapse:collapse;}
  .rank-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);padding:0.5rem 0.6rem;border-bottom:1px solid var(--border);}
  .rank-table td{padding:0.65rem 0.6rem;border-bottom:1px solid rgba(100,120,255,0.08);vertical-align:middle;}
  .rank-table tr:last-child td{border-bottom:none;}
  .rank-table tr:hover td{background:rgba(99,102,241,0.05);}
  .rank-table-wrap{overflow-x:auto;}

  /* ── RANK CARDS (mobile) ── */
  .rank-card-list{display:none;flex-direction:column;gap:0.6rem;}
  .rank-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.875rem;display:flex;align-items:center;gap:0.75rem;cursor:pointer;}
  .rank-card:hover{border-color:var(--border2);}
  .rank-card-info{flex:1;min-width:0;}
  .rank-card-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-card-sub{font-size:11px;color:var(--text3);margin-top:1px;}
  .rank-card-score{text-align:right;flex-shrink:0;}
  .rank-card-pts{font-size:18px;font-weight:700;color:var(--accent3);}
  .rank-card-time{font-size:10px;color:var(--text3);}

  @media(max-width:600px){
    .rank-table-wrap{display:none;}
    .rank-card-list{display:flex;}
  }

  /* ── BADGE ── */
  .rank-badge{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .rank-1{background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.4);}
  .rank-2{background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.3);}
  .rank-3{background:rgba(180,83,9,0.2);color:#cd7c3a;border:1px solid rgba(180,83,9,0.3);}
  .rank-n{background:rgba(100,116,139,0.1);color:var(--text3);border:1px solid var(--border);}

  .team-name-cell{font-weight:600;color:var(--text);}
  .score-pill{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(20,184,166,0.2));border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:0.15rem 0.65rem;font-weight:700;font-size:14px;color:var(--accent3);}
  .progress-bar-wrap{height:5px;background:rgba(100,120,255,0.1);border-radius:3px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle;margin-right:5px;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:3px;transition:width .4s;}
  .time-badge{font-size:11px;color:var(--text3);}

  /* ── MISSION ZONES ── */
  .zone-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;}
  .zone-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;}
  .zone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .zone-name{font-size:13px;font-weight:600;color:var(--text);}
  .zone-max{font-size:11px;color:var(--text3);margin-left:auto;}
  .mission-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.45rem 0;border-bottom:1px solid rgba(100,120,255,0.06);cursor:pointer;}
  .mission-item:last-child{border-bottom:none;}
  .mission-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;transition:all .15s;}
  .mission-check.done{background:var(--green);border-color:var(--green);color:#fff;}
  .mission-text{flex:1;}
  .mission-name{font-size:12px;color:var(--text);}
  .mission-pts{font-size:10px;color:var(--teal);margin-top:1px;}

  /* ── FORMS ── */
  .form-group{margin-bottom:0.8rem;}
  .form-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:0.3rem;}
  .form-input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0.55rem 0.8rem;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--text3);}
  textarea.form-input{resize:vertical;min-height:65px;}

  /* ── BUTTONS ── */
  .btn{border:none;border-radius:var(--radius-sm);padding:0.55rem 1.1rem;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:var(--accent2);border:1px solid var(--border2);}
  .btn-ghost:hover{background:rgba(99,102,241,0.1);}
  .btn-danger{background:rgba(244,63,94,0.15);color:var(--coral);border:1px solid rgba(244,63,94,0.3);}
  .btn-danger:hover{background:rgba(244,63,94,0.25);}
  .btn-sm{padding:0.3rem 0.65rem;font-size:12px;}

  /* ── TEAM DASH CARD ── */
  .team-dash-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:border-color .15s,transform .1s;}
  .team-dash-card:hover{border-color:var(--border2);transform:translateY(-2px);}
  .team-dash-card.selected{border-color:var(--accent);}
  .team-dash-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
  .team-dash-school{font-size:11px;color:var(--text3);margin-bottom:0.65rem;}
  .team-members{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.65rem;}
  .member-chip{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:0.1rem 0.55rem;font-size:11px;color:var(--accent3);}
  .team-score-row{display:flex;align-items:center;justify-content:space-between;margin-top:0.5rem;}
  .team-big-score{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

  /* ── MEMBER INFO CARD ── */
  .member-info-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.875rem;margin-bottom:0.75rem;position:relative;}
  .member-info-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
  .member-info-name{font-size:13px;font-weight:700;color:var(--accent3);}
  .member-remove-btn{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;}
  .member-remove-btn:hover{color:var(--coral);}
  .member-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
  @media(max-width:400px){.member-grid{grid-template-columns:1fr;}}

  /* ── PLEDGE ── */
  .pledge-card{background:linear-gradient(135deg,rgba(99,102,241,0.05),rgba(20,184,166,0.05));border:1px solid rgba(99,102,241,0.2);border-radius:var(--radius);padding:0.875rem 1.1rem;}
  .pledge-text{font-size:12px;color:var(--text2);line-height:1.7;font-style:italic;}
  .pledge-author{font-size:11px;color:var(--accent3);margin-top:0.4rem;font-style:normal;font-weight:600;}

  /* ── MODAL ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;}
  @media(min-width:600px){.modal-bg{align-items:center;padding:1rem;}}
  .modal{background:var(--card);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;position:relative;}
  @media(min-width:600px){.modal{border-radius:16px;}}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:1.1rem;color:var(--text);}
  .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:0.25rem;}
  .modal-close:hover{color:var(--text);}

  /* ── PILLS ── */
  .pill{display:inline-flex;align-items:center;gap:3px;padding:0.15rem 0.55rem;border-radius:20px;font-size:11px;font-weight:600;}
  .pill-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
  .pill-amber{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.3);}
  .pill-blue{background:rgba(99,102,241,0.15);color:var(--accent2);border:1px solid rgba(99,102,241,0.3);}

  /* ── MISC ── */
  .section-tag{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:0.3rem;display:block;}
  .section-h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:0.875rem;}
  .banner{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(20,184,166,0.1));border:1px solid rgba(99,102,241,0.25);border-radius:var(--radius);padding:0.75rem 1rem;display:flex;align-items:flex-start;gap:0.65rem;margin-bottom:1rem;}
  .banner-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
  .banner-text{font-size:12px;color:var(--text2);line-height:1.5;}
  .banner-text strong{color:var(--accent3);}
  .route-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.65rem;min-height:60px;}
  .route-step{display:inline-flex;align-items:center;gap:0.3rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:0.2rem 0.65rem;font-size:12px;margin:0.2rem;}
  .route-step .step-num{width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.3;}
</style>
</head>
<body>
<div class="stars-bg" id="stars"></div>

<header class="hero">
  <div class="hero-inner">
    <div class="wro-emblem">🏛️</div>
    <div class="wro-title">
      <div class="subtitle">WRO 2026 · RoboMission · 중등부</div>
      <h1>Heritage Heroes Dashboard <span class="sync-badge sync-mobile">⏳ 연결 중...</span></h1>
    </div>
    <div class="hero-right">
      <span class="sync-badge sync-desktop">⏳ 연결 중...</span>
      <div class="dday-area" id="dday-area"></div>
    </div>
  </div>
</header>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-tab active" onclick="showTab('dashboard')">🏆 종합</button>
    <button class="nav-tab" onclick="showTab('missions')">🗺️ 미션</button>
    <button class="nav-tab" onclick="showTab('teams')">👥 팀 정보</button>
    <button class="nav-tab" onclick="showTab('route')">🚀 경로</button>
    <button class="nav-tab" onclick="showTab('scores')">📊 점수</button>
  </div>
</nav>

<main class="main" id="main-content"></main>

<div class="modal-bg" id="modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const MISSIONS = [
  { id:'m1', zone:'방문객 안내', color:'#6366f1', dotColor:'#6366f1',
    tasks:[{id:'t1a',name:'방문객 1 — 색상 구역 완전 진입',pts:10},{id:'t1b',name:'방문객 2 — 색상 구역 완전 진입',pts:10},{id:'t1c',name:'방문객 3 — 색상 구역 완전 진입',pts:10},{id:'t1d',name:'방문객 4 — 색상 구역 완전 진입',pts:10}],
    maxScore:40, partialTask:{id:'t1p',name:'방문객 일부 걸침 (개당 5점)',pts:5}},
  { id:'m2', zone:'탑 재건', color:'#f59e0b', dotColor:'#f59e0b',
    tasks:[{id:'t2a',name:'빨간색 탑 — 구역 완전 진입',pts:15},{id:'t2b',name:'빨간색 탑 — 일부 걸침',pts:10},{id:'t2c',name:'노란색 탑 받침대 — 구역 완전 진입',pts:25},{id:'t2d',name:'노란색 탑 받침대 — 일부 걸침',pts:15}],
    maxScore:80, note:'빨간 탑 최대 30점 · 노란 탑 최대 50점'},
  { id:'m3', zone:'유물 운반', color:'#14b8a6', dotColor:'#14b8a6',
    tasks:[{id:'t3a',name:'유물 1 — 색상 전시 장소 완전 진입',pts:15},{id:'t3b',name:'유물 2 — 색상 전시 장소 완전 진입',pts:15},{id:'t3c',name:'유물 3 — 색상 전시 장소 완전 진입',pts:15},{id:'t3d',name:'유물 4 — 색상 전시 장소 완전 진입',pts:15}],
    maxScore:60},
  { id:'m4', zone:'자갈길 청소', color:'#22c55e', dotColor:'#22c55e',
    tasks:[{id:'t4a',name:'먼지 1',pts:2},{id:'t4b',name:'먼지 2',pts:2},{id:'t4c',name:'먼지 3',pts:2},{id:'t4d',name:'먼지 4',pts:2},{id:'t4e',name:'먼지 5',pts:2},{id:'t4f',name:'먼지 6',pts:2},{id:'t4g',name:'먼지 7',pts:2},{id:'t4h',name:'먼지 8',pts:2},{id:'t4i',name:'먼지 9',pts:2},{id:'t4j',name:'먼지 10',pts:2}],
    maxScore:20},
  { id:'m5', zone:'보너스', color:'#f43f5e', dotColor:'#f43f5e',
    tasks:[{id:'t5a',name:'차단막 1 — 이동/손상 없음',pts:10},{id:'t5b',name:'차단막 2 — 이동/손상 없음',pts:10},{id:'t5c',name:'앵무새 — 이동/손상 없음',pts:10}],
    maxScore:30}
];

const MAX_SCORE = 230;
const CONTEST_DATE = new Date('2026-08-09T09:00:00');

// 팀원 구조: { name, grade, role, pledge }
let state = {
  teams: [
    { id:'team1', name:'헤리티지 선봉대', school:'한국중학교',
      memberList:[
        {name:'김민준', grade:'2학년', role:'드라이버', pledge:'열심히 준비했습니다. 최선을 다하겠습니다!'},
        {name:'이서연', grade:'2학년', role:'네비게이터', pledge:'팀을 위해 최선을 다해 지원하겠습니다!'}
      ],

let db=null, teamsRef=null, pinCoordsRef=null, firebaseReady=false;

function initFirebase() {
  try {
    if (!firebase || firebaseConfig.apiKey==='YOUR_API_KEY') { showFirebaseGuide(); return false; }
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    teamsRef = db.ref('wro2026/teams');
    pinCoordsRef = db.ref('wro2026/pinCoords');
    teamsRef.on('value', snap => {
      const data = snap.val();
      if (data) state.teams = Object.values(data);
      else pushInitialData();
      render(); updateSyncStatus('connected');
    }, err => { updateSyncStatus('error'); fallbackToLocal(); });
    pinCoordsRef.on('value', snap => {
      const data = snap.val();
      if (data) {
        PIN_DEFS.forEach(p => { if (data[p.id]) { p.x = data[p.id].x; p.y = data[p.id].y; } });
        render();
      }
    });
    firebaseReady = true; return true;
  } catch(e) { fallbackToLocal(); return false; }
}
function pushInitialData() { state.teams.forEach(t => teamsRef.child(t.id).set(t)); }
function saveTeamToFirebase(team) {
  if (!firebaseReady||!teamsRef) { fallbackToLocal(); return; }
  teamsRef.child(team.id).set(team).then(()=>updateSyncStatus('saved')).catch(()=>updateSyncStatus('error'));
}
function deleteTeamFromFirebase(id) { if (firebaseReady&&teamsRef) teamsRef.child(id).remove(); }
function savePinCoordsToFirebase() {
  if (!firebaseReady || !pinCoordsRef) { savePinCoordsToLocal(); return; }
  var payload = {};
  PIN_DEFS.forEach(function(p){ payload[p.id] = { x: p.x, y: p.y }; });
  pinCoordsRef.set(payload).then(()=>updateSyncStatus('saved')).catch(()=>updateSyncStatus('error'));
}
function savePinCoordsToLocal() {
  try {
    var payload = {};
    PIN_DEFS.forEach(function(p){ payload[p.id] = { x: p.x, y: p.y }; });
    localStorage.setItem('wro2026_pinCoords', JSON.stringify(payload));
  } catch(e) {}
}
function loadPinCoordsFromLocal() {
  try {
    var s = localStorage.getItem('wro2026_pinCoords');
    if (s) {
      var data = JSON.parse(s);
      PIN_DEFS.forEach(function(p){ if (data[p.id]) { p.x = data[p.id].x; p.y = data[p.id].y; } });
    }
  } catch(e) {}
}
function fallbackToLocal() { try { const s=localStorage.getItem('wro2026_state'); if(s) state={...state,...JSON.parse(s)}; } catch(e){} loadPinCoordsFromLocal(); render(); }
function saveState() { if (firebaseReady) return; try { localStorage.setItem('wro2026_state',JSON.stringify(state)); } catch(e){} }
function updateSyncStatus(status) {
  const els=document.querySelectorAll('.sync-badge'); if(!els.length) return;
  const map={connected:{text:'🟢 실시간 연결됨',color:'var(--green)'},saved:{text:'✅ 저장됨',color:'var(--teal)'},error:{text:'🔴 연결 오류',color:'var(--coral)'},local:{text:'🟡 로컬 모드',color:'var(--amber)'}};
  const s=map[status]||map.local;
  els.forEach(el=>{ el.textContent=s.text; el.style.color=s.color; });
}
function showFirebaseGuide() { updateSyncStatus('local'); fallbackToLocal(); }

// ── Helpers ──
function getTeamScore(team) { let s=0; MISSIONS.forEach(m=>m.tasks.forEach(t=>{ if(team.completedTasks.includes(t.id)) s+=t.pts; })); return s; }
function getTeamMissionCount(team) { return MISSIONS.filter(m=>m.tasks.some(t=>team.completedTasks.includes(t.id))).length; }
function getTeamProgress(team) { const total=MISSIONS.reduce((a,m)=>a+m.tasks.length,0); return Math.round(team.completedTasks.length/total*100); }
function getRankedTeams() { return [...state.teams].sort((a,b)=>{ const sa=getTeamScore(a),sb=getTeamScore(b); if(sb!==sa) return sb-sa; if(a.completedTime&&b.completedTime) return a.completedTime.localeCompare(b.completedTime); return a.completedTime?-1:1; }); }
function selectedTeam() { return state.teams.find(t=>t.id===state.selectedTeamId)||state.teams[0]; }
function getZoneScore(team,mid) { const m=MISSIONS.find(x=>x.id===mid); if(!m) return 0; return m.tasks.filter(t=>team.completedTasks.includes(t.id)).reduce((a,t)=>a+t.pts,0); }
function rankClass(i) { return ['rank-1','rank-2','rank-3'][i]||'rank-n'; }
// 구버전 호환: memberList 없으면 members 배열에서 변환
function getMemberList(team) {
  if (team.memberList) return team.memberList.map(m=>({school:team.school||'', ...m}));
  if (team.members) return team.members.map(name=>({name,school:team.school||'',grade:team.grade||'',role:team.role||'',pledge:team.pledge||''}));
  return [];
}

function renderDDay() {
  const diff = CONTEST_DATE - new Date();
  if (diff<=0) { document.getElementById('dday-area').innerHTML='<span class="dday-badge">🎉 대회 당일!</span>'; return; }
  const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  document.getElementById('dday-area').innerHTML=`
    <div class="dday-box"><span class="dday-num">${d}</span><div class="dday-label">일</div></div>
    <div class="dday-box"><span class="dday-num">${String(h).padStart(2,'0')}</span><div class="dday-label">시</div></div>
    <div class="dday-box"><span class="dday-num">${String(m).padStart(2,'0')}</span><div class="dday-label">분</div></div>
    <div class="dday-box"><span class="dday-num">${String(s).padStart(2,'0')}</span><div class="dday-label">초</div></div>
    <div class="dday-badge">D-${d}</div>`;
}

// ── Route helpers ──────────────────────────────────
// 픽업 핀 id 목록
var PICKUP_IDS = ['t-yel-pu','t-red-pu','v-pu','a-pu','cobble'];

function arrowHead(x1,y1,x2,y2) {
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  var ux=dx/len,uy=dy/len,mx=(x1+x2)/2,my=(y1+y2)/2,size=2.2;
  return (mx+ux*size)+','+(my+uy*size)+' '+(mx-uy*size)+','+(my+ux*size)+' '+(mx+uy*size)+','+(my-ux*size);
}

// ── 편집 모드 (핀 위치 드래그 조정) ──
var EDIT_MODE = false;

function toggleEditMode() {
  EDIT_MODE = !EDIT_MODE;
  render();
  if (EDIT_MODE) setTimeout(attachPinDrag, 50);
}

function attachPinDrag() {
  var pins = document.querySelectorAll('.map-pin.editable');
  var mapWrap = document.getElementById('map-wrap');
  if (!mapWrap) return;
  pins.forEach(function(el) {
    var pinId = el.getAttribute('data-pinid');
    function startDrag(e) {
      e.preventDefault();
      el.style.cursor = 'grabbing';
      var rect = mapWrap.getBoundingClientRect();
      function move(ev) {
        var cx = (ev.touches ? ev.touches[0].clientX : ev.clientX);
        var cy = (ev.touches ? ev.touches[0].clientY : ev.clientY);
        var px = Math.max(0, Math.min(100, (cx - rect.left) / rect.width * 100));
        var py = Math.max(0, Math.min(100, (cy - rect.top) / rect.height * 100));
        el.style.left = px + '%';
        el.style.top = py + '%';
        var pin = PIN_DEFS.find(function(p){ return p.id === pinId; });
        if (pin) { pin.x = Math.round(px*10)/10; pin.y = Math.round(py*10)/10; }
      }
      function end() {
        el.style.cursor = 'grab';
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', end);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', end);
        if (firebaseReady) savePinCoordsToFirebase(); else savePinCoordsToLocal();
      }
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', end);
      document.addEventListener('touchmove', move, {passive:false});
      document.addEventListener('touchend', end);
    }
    el.addEventListener('mousedown', startDrag);
    el.addEventListener('touchstart', startDrag, {passive:false});
  });
}

function renderRouteSVG(team) {
  if (!team.route || team.route.length < 2) return '';
  var lines = '';
  for (var i = 0; i < team.route.length - 1; i++) {
    var fromId = team.route[i];
    var toId   = team.route[i+1];
    var fp = PIN_DEFS.find(function(p){ return p.id === fromId; });
    var tp = PIN_DEFS.find(function(p){ return p.id === toId; });
    if (!fp || !tp) continue;
    var color = fp.color;
    lines += '<line x1="'+fp.x+'" y1="'+fp.y+'" x2="'+tp.x+'" y2="'+tp.y+'"'
      +' stroke="'+color+'" stroke-width="1.8" stroke-dasharray="3,2" stroke-linecap="round" opacity="0.9"/>';
    lines += '<polygon points="'+arrowHead(fp.x,fp.y,tp.x,tp.y)+'" fill="'+color+'" opacity="0.9"/>';
  }
  return lines;
}

function renderZonePins(team) {
  return PIN_DEFS.map(function(pin) {
    var inRoute  = team.route ? team.route.indexOf(pin.id) : -1;
    var isActive = inRoute >= 0;
    var isBonusPin = pin.group === '보너스';
    var stepNum  = isActive ? (inRoute + 1) : '';
    var pinColor = isActive ? pin.color : (isBonusPin ? 'rgba(30,30,60,0.6)' : 'rgba(15,15,40,0.75)');
    var border   = isActive ? '#fff' : pin.color;
    var size     = isActive ? '28px' : '20px';
    var fs       = isActive ? '12px' : '10px';
    var innerTxt = isActive ? String(stepNum) : pin.label.split(' ')[0];
    var subTxt   = pin.label.split(' ').slice(1).join(' ');
    // 편집 모드: 드래그 가능하게 표시
    var editStyle = EDIT_MODE ? 'pointer-events:auto;cursor:grab;' : 'pointer-events:none;';
    var editBorder = EDIT_MODE ? '3px dashed #fbbf24' : '2px solid '+border;
    return '<div data-pinid="'+pin.id+'" class="map-pin'+(EDIT_MODE?' editable':'')+'" style="position:absolute;left:'+pin.x+'%;top:'+pin.y+'%;transform:translate(-50%,-50%);text-align:center;'+editStyle+'z-index:'+(EDIT_MODE?'10':'2')+'">'
      +'<div style="background:'+pinColor+';border:'+editBorder+';border-radius:50%;width:'+size+';height:'+size+';display:flex;align-items:center;justify-content:center;font-size:'+fs+';box-shadow:0 2px 8px rgba(0,0,0,0.7);margin:0 auto;font-weight:700;color:#fff">'+innerTxt+'</div>'
      +'<div style="background:rgba(5,5,20,0.9);color:'+(isActive ? pin.color : '#475569')+';font-size:8px;font-weight:600;padding:1px 4px;border-radius:6px;margin-top:1px;white-space:nowrap;border:1px solid '+(isActive ? pin.color : 'rgba(100,120,255,0.15)')+'">'+subTxt+'</div>'
      +'</div>';
  }).join('');
}

function renderRouteSteps(team) {
  if (!team.route || team.route.length === 0) {
    return '<span style="color:var(--text3);font-size:12px">아직 경로가 없습니다. 아래에서 핀을 추가하세요.</span>';
  }
  return team.route.map(function(pinId, i) {
    var pin = PIN_DEFS.find(function(p){ return p.id === pinId; });
    if (!pin) return '';
    return '<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(30,30,60,0.8);border:1px solid '+pin.color+';border-radius:20px;padding:3px 8px;font-size:11px;margin:2px">'
      +'<span style="width:16px;height:16px;border-radius:50%;background:'+pin.color+';color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</span>'
      +pin.label
      +'<button onclick="removeRoutePin(\''+pinId+'\')" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;line-height:1;padding:0 1px;margin-left:2px">×</button>'
      +'</span>'
      +(i < team.route.length-1 ? '<span style="color:var(--text3);font-size:13px"> → </span>' : '');
  }).join('');
}

function renderRoute() {
  var team = selectedTeam();

  // 시작 핀 별도 처리
  var startPin = PIN_DEFS.find(function(p){ return p.id === 'start'; });
  var startAlready = team.route && team.route.indexOf('start') >= 0;
  var startBtnHtml = '<div style="display:flex;align-items:center;gap:6px;background:rgba(251,191,36,0.1);padding:6px 10px;border-radius:8px;border:1.5px solid #fbbf24;margin-bottom:0.5rem">'
    +'<span style="font-size:11px;font-weight:700;color:#fbbf24">출발 위치</span>'
    +'<button onclick="addRoutePin(\'start\')" '
      +'style="background:'+(startAlready ? '#fbbf2444' : '#fbbf2422')+';border:1px solid #fbbf24;border-radius:12px;padding:3px 9px;font-size:11px;font-weight:700;color:#fbbf24;cursor:'+(startAlready?'default':'pointer')+';opacity:'+(startAlready?'0.5':'1')+'" '
      +(startAlready ? 'disabled' : '')+'>'+startPin.label+'</button>'
    +'</div>';

  // 그룹별 추가 가능한 핀 (보너스·시작 제외, 이미 추가된 것 제외)
  var groups = {};
  PIN_DEFS.filter(function(p){ return p.group !== '보너스' && p.group !== '시작'; }).forEach(function(p){
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push(p);
  });

  var btnHtml = Object.keys(groups).map(function(g) {
    var mObj = MISSIONS.find(function(x){ return x.zone===g; });
    var dotColor = mObj ? mObj.dotColor : '#6366f1';
    var pins = groups[g];
    return '<div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center;background:rgba(100,120,255,0.05);padding:5px 8px;border-radius:8px;border:1px solid '+dotColor+'44">'
      +'<span style="font-size:10px;font-weight:700;color:'+dotColor+';margin-right:3px;white-space:nowrap">'+g+'</span>'
      + pins.map(function(p){
          var alreadyIn = team.route && team.route.indexOf(p.id) >= 0;
          return '<button onclick="addRoutePin(\''+p.id+'\')" '
            +'style="background:'+(alreadyIn ? p.color+'44' : p.color+'22')+';border:1px solid '+p.color+';border-radius:12px;padding:2px 7px;font-size:10px;font-weight:600;color:'+p.color+';cursor:'+(alreadyIn?'default':'pointer')+';opacity:'+(alreadyIn?'0.5':'1')+';white-space:nowrap" '
            +(alreadyIn ? 'disabled' : '')+'>'
            +p.label+'</button>';
        }).join('')
      +'</div>';
  }).join('');

  return '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap">'
    +'<span style="font-size:13px;color:var(--text2)">팀:</span>'
    +state.teams.map(function(t){
      return '<button onclick="selectTeam(\''+t.id+'\');render()" class="btn btn-sm '+(t.id===state.selectedTeamId?'btn-primary':'btn-ghost')+'">'+t.name+'</button>';
    }).join('')
    +'</div>'
    +'<div class="card">'
    +'<div class="card-header"><div class="card-title">🗺️ '+team.name+' — 경로 맵</div>'
    +'<button class="btn btn-sm '+(EDIT_MODE?'btn-primary':'btn-ghost')+'" onclick="toggleEditMode()">'+(EDIT_MODE?'✓ 편집 완료':'✏️ 핀 위치 편집')+'</button>'
    +'</div>'
    +(EDIT_MODE ? '<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:var(--radius-sm);padding:0.6rem 0.8rem;margin-bottom:0.75rem;font-size:11px;color:var(--gold2)">✏️ 편집 모드: 핀을 드래그하면 위치가 자동으로 저장되며, 모든 사람의 화면에 즉시 반영됩니다.</div>' : '')
    // 맵 이미지 + 오버레이
    +'<div id="map-wrap" style="position:relative;width:100%;border-radius:var(--radius-sm);overflow:hidden;background:#111827;border:1px solid var(--border);margin-bottom:0.875rem">'
    +'<img src="data:image/jpeg;base64,'+MAP_B64+'" style="width:100%;display:block;opacity:0.9" alt="WRO 2026 Game Mat" draggable="false">'
    +'<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 100" preserveAspectRatio="none">'
    +renderRouteSVG(team)
    +'</svg>'
    +'<div style="position:absolute;top:0;left:0;width:100%;height:100%">'+renderZonePins(team)+'</div>'
    +'</div>'
    // 수행 순서
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:0.5rem">📍 수행 순서</div>'
    +'<div class="route-box" style="margin-bottom:0.875rem">'+renderRouteSteps(team)+'</div>'
    // 핀 추가
    +startBtnHtml
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:0.5rem">핀 추가 (보너스 제외, 중복 불가):</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.875rem">'+btnHtml+'</div>'
    +'<div style="display:flex;gap:0.5rem">'
    +'<button class="btn btn-danger btn-sm" onclick="clearRoute(\''+team.id+'\')">경로 초기화</button>'
    +'</div>'
    // 전략 팁
    +'<div style="margin-top:0.75rem;padding:0.75rem;background:rgba(99,102,241,0.05);border-radius:var(--radius-sm);border:1px solid var(--border)">'
    +'<div style="font-size:11px;color:var(--accent3);font-weight:600;margin-bottom:0.35rem">💡 전략 팁</div>'
    +'<div style="font-size:11px;color:var(--text2);display:flex;flex-direction:column;gap:0.25rem">'
    +'<div>• 보너스 구역(차단막·앵무새)은 경로에 포함되지 않지만 맵에 위치가 표시됩니다</div>'
    +'<div>• 픽업 → 드롭 순서로 추가하면 실제 로봇 이동 순서를 반영할 수 있습니다</div>'
    +'<div>• 유물 운반(최대 60점)을 시간 부족 시 우선시하세요</div>'
    +'</div></div>'
    +'</div>';
}


// ── Scores ──
function renderScores() {
  const ranked=getRankedTeams();
  return `
  <span class="section-tag">점수 상세 분석</span>
  <div class="card gap-15">
    <div class="card-header"><div class="card-title">📊 구역별 점수 비교</div></div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="rank-table" style="min-width:520px">
        <thead><tr><th>팀</th>${MISSIONS.map(m=>`<th style="color:${m.dotColor}">${m.zone}<br><span style="color:var(--text3);font-size:9px">최대${m.maxScore}점</span></th>`).join('')}<th>합계</th></tr></thead>
        <tbody>${ranked.map((team,i)=>`
          <tr>
            <td><div style="display:flex;align-items:center;gap:0.4rem"><span class="rank-badge ${rankClass(i)}">${i+1}</span><div style="font-weight:600;font-size:12px">${team.name}</div></div></td>
            ${MISSIONS.map(m=>{const s=getZoneScore(team,m.id),pct=Math.round(s/m.maxScore*100);return `<td><div style="font-weight:600;font-size:13px;color:${m.dotColor}">${s}</div><div style="height:3px;background:rgba(100,120,255,0.1);border-radius:2px;margin-top:3px;width:50px"><div style="height:100%;width:${pct}%;background:${m.dotColor};opacity:.7;border-radius:2px"></div></div></td>`;}).join('')}
            <td><span class="score-pill">${getTeamScore(team)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div class="grid-2" style="margin-top:1rem">
    ${MISSIONS.map(m=>{const scores=state.teams.map(t=>({name:t.name,score:getZoneScore(t,m.id)})).sort((a,b)=>b.score-a.score);return `
    <div class="zone-card">
      <div class="zone-header"><div class="zone-dot" style="background:${m.dotColor}"></div><div class="zone-name">${m.zone}</div><div class="zone-max">최대 ${m.maxScore}점</div></div>
      ${scores.map((s,i)=>`<div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.35rem">
        <span style="font-size:10px;color:var(--text3);width:14px">${i+1}</span>
        <span style="font-size:12px;flex:1;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
        <div class="progress-bar-wrap" style="width:55px"><div class="progress-bar-fill" style="width:${Math.round(s.score/m.maxScore*100)}%;background:${m.dotColor}"></div></div>
        <span style="font-size:12px;font-weight:600;color:${m.dotColor};min-width:24px;text-align:right">${s.score}</span>
      </div>`).join('')}
    </div>`;}).join('')}
  </div>`;
}

// ── Actions ──
function selectTeam(id) { state.selectedTeamId=id; saveState(); render(); }
function toggleTask(teamId,taskId) {
  const team=state.teams.find(t=>t.id===teamId); if(!team) return;
  const idx=team.completedTasks.indexOf(taskId);
  if(idx>=0) team.completedTasks.splice(idx,1); else team.completedTasks.push(taskId);
  if(firebaseReady) saveTeamToFirebase(team); else { saveState(); render(); }
}
function updateTime(teamId,val) {
  const team=state.teams.find(t=>t.id===teamId); if(!team) return;
  team.completedTime=val||null;
  if(firebaseReady) saveTeamToFirebase(team); else saveState();
}
function addRoutePin(pinId) {
  var team = selectedTeam(); if(!team) return;
  var pin = PIN_DEFS.find(function(p){ return p.id===pinId; });
  if(!pin) return;
  if(pin.group === '보너스') return;
  if(!team.route) team.route=[];
  if(team.route.indexOf(pinId) >= 0) return;
  // 시작 지점이 먼저 추가되어야 함
  if (pin.id !== 'start' && team.route.indexOf('start') < 0) {
    alert('먼저 🚩 시작 지점을 추가해주세요!');
    return;
  }
  team.route.push(pinId);
  if(firebaseReady) saveTeamToFirebase(team); else { saveState(); render(); }
}
function removeRoutePin(pinId) {
  var team = selectedTeam(); if(!team||!team.route) return;
  var idx = team.route.indexOf(pinId);
  if(idx >= 0) team.route.splice(idx, 1);
  if(firebaseReady) saveTeamToFirebase(team); else { saveState(); render(); }
}
function clearRoute(teamId) {
  const team=state.teams.find(t=>t.id===teamId); if(!team) return;
  team.route=[];
  if(firebaseReady) saveTeamToFirebase(team); else { saveState(); render(); }
}
function deleteTeam(id) {
  if(!confirm('이 팀을 삭제할까요?')) return;
  state.teams=state.teams.filter(t=>t.id!==id);
  if(state.selectedTeamId===id&&state.teams.length>0) state.selectedTeamId=state.teams[0].id;
  if(firebaseReady) deleteTeamFromFirebase(id); else { saveState(); render(); }
}

// ── Modal: 팀 추가/수정 (팀원 개별 입력) ──
let modalMembers = [];

function openAddTeam() {
  modalMembers=[{name:'',school:'',grade:'',role:'',pledge:''}];
  document.getElementById('modal-body').innerHTML=teamFormHTML(null);
  document.getElementById('modal').style.display='flex';
}
function openEditTeam(id) {
  const team=state.teams.find(t=>t.id===id);
  modalMembers=getMemberList(team).map(m=>({...m}));
  if(modalMembers.length===0) modalMembers=[{name:'',school:'',grade:'',role:'',pledge:''}];
  document.getElementById('modal-body').innerHTML=teamFormHTML(team);
  document.getElementById('modal').style.display='flex';
}
function closeModal(e) {
  if(!e||e.target===document.getElementById('modal')) document.getElementById('modal').style.display='none';
}

function addMemberSlot() {
  // 현재 입력값 읽기
  syncModalMembers();
  modalMembers.push({name:'',school:'',grade:'',role:'',pledge:''});
  document.getElementById('members-area').innerHTML=renderMemberSlots();
}
function removeMemberSlot(idx) {
  syncModalMembers();
  if(modalMembers.length<=1) return;
  modalMembers.splice(idx,1);
  document.getElementById('members-area').innerHTML=renderMemberSlots();
}
function syncModalMembers() {
  modalMembers=modalMembers.map((_,i)=>({
    name:(document.getElementById(`m-name-${i}`)||{}).value||'',
    school:(document.getElementById(`m-school-${i}`)||{}).value||'',
    grade:(document.getElementById(`m-grade-${i}`)||{}).value||'',
    role:(document.getElementById(`m-role-${i}`)||{}).value||'',
    pledge:(document.getElementById(`m-pledge-${i}`)||{}).value||''
  }));
}

function renderMemberSlots() {
  return modalMembers.map((m,i)=>`
  <div class="member-info-card">
    <div class="member-info-header">
      <div class="member-info-name">👤 팀원 ${i+1}</div>
      ${modalMembers.length>1?`<button class="member-remove-btn" onclick="removeMemberSlot(${i})">✕</button>`:''}
    </div>
    <div class="member-grid">
      <div class="form-group" style="margin-bottom:0.5rem">
        <label class="form-label">이름</label>
        <input class="form-input" id="m-name-${i}" placeholder="홍길동" value="${m.name}">
      </div>
      <div class="form-group" style="margin-bottom:0.5rem">
        <label class="form-label">학교명</label>
        <input class="form-input" id="m-school-${i}" placeholder="학교 이름" value="${m.school||''}">
      </div>
      <div class="form-group" style="margin-bottom:0.5rem">
        <label class="form-label">학년</label>
        <input class="form-input" id="m-grade-${i}" placeholder="2학년" value="${m.grade}">
      </div>
      <div class="form-group" style="margin-bottom:0.5rem">
        <label class="form-label">역할</label>
        <input class="form-input" id="m-role-${i}" placeholder="드라이버, 코더..." value="${m.role}">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">대회 각오</label>
      <textarea class="form-input" id="m-pledge-${i}" placeholder="이 팀원의 대회 각오를 입력하세요" style="min-height:55px">${m.pledge}</textarea>
    </div>
  </div>`).join('');
}

function teamFormHTML(team) {
  return `
  <div class="modal-title">${team?'팀 정보 수정':'새 팀 추가'}</div>
  <input type="hidden" id="f-id" value="${team?.id||''}">
  <div class="form-group" style="margin-bottom:0.875rem">
    <label class="form-label">팀명 *</label>
    <input class="form-input" id="f-name" placeholder="팀명 입력" value="${team?.name||''}">
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.65rem">
    <div style="font-size:12px;font-weight:600;color:var(--text)">👥 팀원 정보</div>
    <button class="btn btn-ghost btn-sm" onclick="addMemberSlot()">+ 팀원 추가</button>
  </div>
  <div id="members-area">${renderMemberSlots()}</div>
  <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--border)">
    <button class="btn btn-ghost" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="saveTeam()">저장</button>
  </div>`;
}

function saveTeam() {
  const id=document.getElementById('f-id').value;
  const name=document.getElementById('f-name').value.trim();
  if(!name) { alert('팀명은 필수입니다.'); return; }
  syncModalMembers();
  const memberList=modalMembers.filter(m=>m.name.trim());
  const school=(memberList[0]&&memberList[0].school)||'';

  let team;
  if(id) {
    team=state.teams.find(t=>t.id===id);
    if(team) Object.assign(team,{name,school,memberList});
  } else {
    team={id:'team'+Date.now(),name,school,memberList,completedTasks:[],completedTime:null,route:[]};
    state.teams.push(team);
  }
  if(firebaseReady) saveTeamToFirebase(team); else { saveState(); render(); }
  closeModal();
  render();
}

// ── Init ──
window.addEventListener('load',()=>{
  const ok=initFirebase();
  if(!ok) { fallbackToLocal(); render(); }
});
</script>
</body>
</html>
